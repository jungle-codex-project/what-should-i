{% extends "base.html" %}
{% block title %}회원가입 | WhatShouldIDo{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-surface auth-card">
            <span class="eyebrow">Create your taste map</span>
            <h1 class="h2 mt-2 mb-3">WhatShouldIDo 시작하기</h1>
            <p class="text-muted mb-4">계정을 만들면 추천 히스토리와 취향 프로필을 저장할 수 있습니다.</p>
            <form method="post" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">이름</label>
                    <input type="text" name="name" class="form-control form-control-lg" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">이메일</label>
                    <input type="email" name="email" class="form-control form-control-lg" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">비밀번호</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">비밀번호 확인</label>
                    <input type="password" name="password_confirm" class="form-control form-control-lg" required>
                </div>
                <div class="col-12">
                    <button class="btn btn-dark btn-lg rounded-pill px-4">회원가입 후 대시보드 열기</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
